apiVersion: v1
kind: Service
metadata:
  name: {{ include "tdarr-node-nvidia.fullname" . }}
  labels:
    {{- include "tdarr-node-nvidia.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: node
      protocol: TCP
      name: node
  selector:
    {{- include "tdarr-node-nvidia.selectorLabels" . | nindent 4 }}
